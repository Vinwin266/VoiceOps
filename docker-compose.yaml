services:
  postgres:
    image: postgres:16-alpine
    container_name: voiceops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceops}
      POSTGRES_DB: ${POSTGRES_DB:-voiceops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
